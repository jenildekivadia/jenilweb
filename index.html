<!DOCTYPE html>
<html>
<head>
<title>Jenil</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    
    background: linear-gradient(270deg,#5f00ff,#8a2be2,#4b0082);
    background-size:600% 600%;
    animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

h1{
    color:orange;
    font-size:60px;
}

img{
    width:220px;
    border-radius:50%;
    margin-top:20px;
    box-shadow:0 0 25px black;
}

</style>

</head>

<body>

<h1>Jenil</h1>

<img src="jenil.png">

</body>
</html>
